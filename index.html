<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/responsive.css" />
  </head>
  <body>
    <main>
      <div class="outer_cal">
        <div class="inner_cal">
          <div class="result_show">
            <span class="expression" id="expression"> </span>
            <span class="result" id="result"></span>
          </div>
          <div class="buttons">
            <button class="btn clear_btn" id="clear">AC</button>
            <button class="btn" id="backspace">⌫</button>
            <button class="btn" id="percentage">%</button>
            <button class="btn" id="divide">÷</button>
            <button class="btn" id="seven">7</button>
            <button class="btn" id="eight">8</button>
            <button class="btn" id="nine">9</button>
            <button class="btn operator_btn" id="multiply">x</button>
            <button class="btn" id="four">4</button>
            <button class="btn" id="five">5</button>
            <button class="btn" id="six">6</button>
            <button class="btn operator_btn" id="subtract">−</button>
            <button class="btn" id="one">1</button>
            <button class="btn" id="two">2</button>
            <button class="btn" id="three">3</button>
            <button class="btn operator_btn" id="add">+</button>
            <button class="btn zero_btn" id="zero">0</button>
            <button class="btn" id="decimal_point">.</button>
            <button class="btn operator_btn" id="equal">=</button>
          </div>
        </div>
      </div>
    </main>
    <script src="javascript/main.js"></script>
  </body>
</html>
